<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODOアプリ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <h1 class="app-title">📝 TODOアプリ</h1>
      </header>

      <main class="app-main">
        <!-- タスク入力エリア -->
        <section class="task-input-section">
          <form class="task-form">
            <input
              class="task-input"
              type="text"
              placeholder="新しいタスクを入力..."
              aria-label="新しいタスクを入力"
            />
            <button class="task-add-button" type="submit">追加</button>
          </form>
        </section>

        <!-- タスク一覧エリア -->
        <section class="task-list-section">
          <h2 class="task-list-title">タスク一覧</h2>
          <ul class="task-list">

            <!-- 未完了タスク -->
            <li class="task-item">
              <label class="task-label">
                <input class="task-checkbox" type="checkbox" />
                <span class="task-text">牛乳を買う</span>
              </label>
              <div class="task-actions">
                <button class="task-edit-button" type="button">編集</button>
                <button class="task-delete-button" type="button">削除</button>
              </div>
            </li>

            <!-- 未完了タスク -->
            <li class="task-item">
              <label class="task-label">
                <input class="task-checkbox" type="checkbox" />
                <span class="task-text">レポートを提出する</span>
              </label>
              <div class="task-actions">
                <button class="task-edit-button" type="button">編集</button>
                <button class="task-delete-button" type="button">削除</button>
              </div>
            </li>

            <!-- 完了済みタスク（is- プレフィックスで状態を表現） -->
            <li class="task-item is-completed">
              <label class="task-label">
                <input class="task-checkbox" type="checkbox" checked />
                <span class="task-text">朝のストレッチをする</span>
              </label>
              <div class="task-actions">
                <button class="task-edit-button" type="button">編集</button>
                <button class="task-delete-button" type="button">削除</button>
              </div>
            </li>

            <!-- 完了済みタスク -->
            <li class="task-item is-completed">
              <label class="task-label">
                <input class="task-checkbox" type="checkbox" checked />
                <span class="task-text">メールを確認する</span>
              </label>
              <div class="task-actions">
                <button class="task-edit-button" type="button">編集</button>
                <button class="task-delete-button" type="button">削除</button>
              </div>
            </li>

          </ul>
        </section>
      </main>
    </div>
  </body>
</html>
